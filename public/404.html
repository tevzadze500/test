<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Page Not Found (404) | ReactionTestPro</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <meta name="theme-color" content="#020617" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
      background:
        radial-gradient(900px 500px at 80% 15%, rgba(16,185,129,0.16), transparent 60%),
        linear-gradient(135deg, #020617 0%, #04122a 100%);
      color: #fff; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px;
    }
    .wrap { max-width: 560px; }
    .code { font-size: 84px; font-weight: 800; letter-spacing: -2px; line-height: 1; }
    .code span { color: #34d399; }
    h1 { font-size: 30px; font-weight: 700; margin: 18px 0 10px; }
    p { color: #94a3b8; font-size: 17px; line-height: 1.6; margin-bottom: 30px; }
    .btns { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    a {
      text-decoration: none; font-weight: 600; font-size: 15px; padding: 12px 22px; border-radius: 12px;
      transition: transform .15s ease;
    }
    a:hover { transform: translateY(-2px); }
    .primary { background: linear-gradient(135deg, #22c55e, #059669); color: #fff; }
    .ghost { background: rgba(148,163,184,0.10); border: 1px solid rgba(148,163,184,0.22); color: #cbd5e1; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">4<span>0</span>4</div>
    <h1>Page Not Found</h1>
    <p>The page you’re looking for doesn’t exist or has moved. Try one of our free reaction &amp; cognitive tests instead.</p>
    <div class="btns">
      <a class="primary" href="/">Go Home</a>
      <a class="ghost" href="/test/reaction-time">Reaction Time Test</a>
      <a class="ghost" href="/test/f1-reaction">F1 Reaction</a>
    </div>
  </div>
</body>
</html>
